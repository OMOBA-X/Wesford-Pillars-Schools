<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Open+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <title>Register Now</title>
</head>

<body>

    <form class="form" id="registerForm" action="register.php" method="POST" enctype="multipart/form-data">

        <div class="bio-data">
            <label>Bio-Data</label><br><br>

            <div class="first-two">
                <input type="text" name="first_name" placeholder="First name*" required>
                <input type="text" name="middle_name" placeholder="Middle name*" required><br><br>
            </div>

            <input type="text" name="last_name" placeholder="Last name*" required><br><br>
            <input type="date" name="dob" required><br><br>

            <div class="file-upload-container">
                <label>Upload Passport Photo*</label><br><br>
                <input class="file" type="file" name="passport" id="passportInput" accept="image/*" required>

                <!-- Passport preview -->
                <div id="preview-container" style="margin-top: 3px;">
                    <img id="passportPreview" src="" alt="Passport Preview"
                        style="display:none; width:340px; height:280px; object-fit:cover; border:1px solid #ccc; border-radius:5px;">
                </div>
            </div>
        </div>

        <img class="logo" src="img/logo.png" alt="School Logo">

        <div class="class-section">
            <select name="class" required>
                <option value="">Class</option>
                <option>KG1</option>
                <option>KG2</option>
                <option>Primary 1</option>
                <option>Primary 2</option>
                <option>Primary 3</option>
                <option>Primary 4</option>
                <option>Primary 5</option>
                <option>Primary 6</option>
                <option>Junior School 1</option>
                <option>Junior School 2</option>
                <option>Junior School 3</option>
                <option>Senior School 1</option>
                <option>Senior School 2</option>
                <option>Senior School 3</option>
            </select>

            <select name="department" required>
                <option value="">Department</option>
                <option>Sciences</option>
                <option>Humanities</option>
                <option>Business</option>
            </select>
        </div>

        <div class="parent-info">
            <label>Parents/Guardian Information</label><br><br>

            <input type="text" name="parent_first_name" placeholder="First name*" required><br><br>
            <input type="text" name="parent_last_name" placeholder="Last name*" required><br><br>

            <input type="text" name="city" placeholder="City*" required><br><br>
            <input type="text" name="lga" placeholder="LGA*" required><br><br>

            <input type="tel" name="phone" placeholder="Phone number*" pattern="^(\+234|0)[789][01]\d{8}$" required>
        </div>

        <div class="optional-info"><br>
            <label>Additional Information (Optional)</label><br>
            <input type="email" name="email" placeholder="Email">

            <div class="btn-container">
                <button type="submit" class="btn-primary">Submit</button>
            </div>
        </div>

    </form>
<!-- 
    <div class="end-note">
        <p class="copyright">
            © 2026 Westford Pillars School. All rights reserved.
        </p> -->
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Code injected by live-server -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

        $(document).ready(function () {

            $("#registerForm").validate({

                rules: {
                    first_name: { required: true, minlength: 2 },
                    middle_name: { required: true, minlength: 2 },
                    last_name: { required: true, minlength: 2 },
                    dob: { required: true },

                    class: { required: true },
                    department: { required: true },

                    parent_first_name: { required: true, minlength: 2 },
                    parent_last_name: { required: true, minlength: 2 },

                    city: { required: true },
                    lga: { required: true },

                    phone: {
                        required: true,
                        digits: true,
                        minlength: 11,
                        maxlength: 14
                    },

                    email: { email: true }
                },

                messages: {
                    first_name: "Enter first name",
                    middle_name: "Enter middle name",
                    last_name: "Enter last name",
                    dob: "Select date of birth",
                    class: "Select class",
                    department: "Select department",
                    parent_first_name: "Enter parent's first name",
                    parent_last_name: "Enter parent's last name",
                    city: "Enter city",
                    lga: "Enter LGA",
                    phone: "Enter valid phone number",
                    email: "Enter a valid email"
                },

                submitHandler: function (form) {

                    Swal.fire({
                        icon: "success",
                        title: "Registration Submitted!",
                        text: "Student registration successful.",
                        confirmButtonColor: "#2b7a78"
                    }).then(() => {
                        form.submit();
                    });

                }

            });

        });

        // Passport Preview Section 
        const passportInput = document.getElementById('passportInput');
        const passportPreview = document.getElementById('passportPreview');

        passportInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    passportPreview.src = e.target.result;
                    passportPreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                passportPreview.src = '';
                passportPreview.style.display = 'none';
            }
        });
    </script>
    </script>
</body>

</html>
